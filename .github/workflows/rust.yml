name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Job 1: Check what changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      logic: ${{ steps.filter.outputs.logic }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          logic:
            - '**/src/**'
            - '**/Cargo.toml'
            - '**/Cargo.lock'
            - 'Dockerfile'
          frontend:
            - '**/index.html'

  # Job 2: Build & Test (Only if logic changed)
  build:
    needs: changes
    if: needs.changes.outputs.logic == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust 1.86+
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: "1.86"
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
    - name: Build all crates
      run: cargo build --workspace --verbose
    - name: Run tests
      run: cargo test --workspace --verbose

  # Job 3: Deploy (Always runs if either logic OR frontend changed)
  deploy:
    runs-on: ubuntu-latest
    needs: [changes, build]
    # Run if logic changed (and build passed) OR if ONLY frontend changed
    if: |
      always() &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.logic == 'true') &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    steps:
    - uses: actions/checkout@v4
    - name: Install flyctl
      uses: superfly/flyctl-actions/setup-flyctl@master
    - name: Deploy to Fly.io
      run: flyctl deploy --remote-only --app ternlang-api --config fly.toml --dockerfile Dockerfile
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
