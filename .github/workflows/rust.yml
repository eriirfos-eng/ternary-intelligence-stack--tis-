name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ternlang-root

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust 1.85+
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: "1.85"

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          ternlang-root/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('ternlang-root/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Build core crates
      run: cargo build -p ternlang-core -p ternlang-ml -p ternlang-moe -p ternlang-mcp --verbose

    - name: Run tests
      run: cargo test -p ternlang-core -p ternlang-ml -p ternlang-moe --verbose
